<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Interface</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f8; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #333;
      color: white;
    }

    .sections button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .container { display: flex; }

    .main { width: 70%; padding: 20px; }

    .palette {
      width: 30%;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .box {
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #ccc;
      height: 40px;
    }

    .options button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    .controls { margin-top: 20px; }

    .controls button {
      padding: 10px 15px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>Mock Test</div>
  <div id="timer">03:00:00</div>
</div>

<div class="sections">
  <button onclick="changeSection('physics')">Physics</button>
  <button onclick="changeSection('chemistry')">Chemistry</button>
  <button onclick="changeSection('maths')">Maths</button>
  <button onclick="changeSection('biology')">Biology</button>
</div>

<div class="container">

  <div class="main">
    <h3 id="question">Question</h3>
    <div id="options" class="options"></div>

    <div class="controls">
      <button onclick="prevQ()">Previous</button>
      <button onclick="markReview()">Mark for Review</button>
      <button onclick="nextQ()">Next</button>
      <button onclick="submitTest()">Submit</button>
    </div>
  </div>

  <div id="palette" class="palette"></div>

</div>

<script>

/* ------------------- QUESTIONS ------------------- */
const questions = {

physics: [
  {
    q: `Question 1`,
    options: [
      { id: 1, text: "A" },
      { id: 2, text: "B" },
      { id: 3, text: "C" },
      { id: 4, text: "D" }
    ],
    answer: 1
  },
  {
    q: `Question 2`,
    options: [
      { id: 1, text: "A" },
      { id: 2, text: "B" },
      { id: 3, text: "C" },
      { id: 4, text: "D" }
    ],
    answer: 2
  }
],

chemistry: [
  {
    q: `Which one of the following statements best describes the acidic/basic/amphoteric nature of ZnO and CaO?`,
    options: [
      { id: 1, text: "ZnO is amphoteric while CaO is basic" },
      { id: 2, text: "ZnO is basic while CaO is amphoteric" },
      { id: 3, text: "Both ZnO and CaO are amphoteric" },
      { id: 4, text: "ZnO is acidic while CaO is basic" }
    ],
    answer: 1
  }
],

maths: [
  {
    q: `Question 1`,
    options: [
      { id: 1, text: "A" },
      { id: 2, text: "B" },
      { id: 3, text: "C" },
      { id: 4, text: "D" }
    ],
    answer: 1
  }
],

biology: [
  {
    q: `Question 1`,
    options: [
      { id: 1, text: "A" },
      { id: 2, text: "B" },
      { id: 3, text: "C" },
      { id: 4, text: "D" }
    ],
    answer: 1
  }
]

};

/* ------------------- STATE ------------------- */
let currentSection = "physics";
let currentIndex = 0;

let userAnswers = {};
let visited = {};
let marked = {};

for (let s in questions) {
  userAnswers[s] = Array(questions[s].length).fill(null);
  visited[s] = Array(questions[s].length).fill(false);
  marked[s] = Array(questions[s].length).fill(false);
}

/* ------------------- SHUFFLE (FIXED) ------------------- */
function shuffle(arr) {
  let newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

/* ------------------- LOAD QUESTION ------------------- */
function loadQuestion() {
  let q = questions[currentSection][currentIndex];
  visited[currentSection][currentIndex] = true;

  document.getElementById("question").innerText =
    (currentIndex+1) + ". " + q.q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  let shuffled = shuffle(q.options);

  shuffled.forEach(opt => {
    let btn = document.createElement("button");

    btn.innerHTML = `
      ${opt.text ? `<div>${opt.text}</div>` : ""}
      ${opt.img ? `<img src="${opt.img}" style="max-width:100px;">` : ""}
    `;

    btn.onclick = () => {
      userAnswers[currentSection][currentIndex] = opt.id;
      updatePalette();
    };

    optionsDiv.appendChild(btn);
  });

  updatePalette();
}

/* ------------------- PALETTE ------------------- */
function updatePalette() {
  let palette = document.getElementById("palette");
  palette.innerHTML = "";

  for (let i = 0; i < questions[currentSection].length; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = i + 1;

    if (!visited[currentSection][i]) {
      box.style.background = "white";
    } else if (marked[currentSection][i]) {
      box.style.background = "yellow";
    } else if (userAnswers[currentSection][i]) {
      box.style.background = "green";
    } else {
      box.style.background = "red";
    }

    box.onclick = () => {
      currentIndex = i;
      loadQuestion();
    };

    palette.appendChild(box);
  }
}

/* ------------------- NAVIGATION ------------------- */
function nextQ() {
  if (currentIndex < questions[currentSection].length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

function markReview() {
  marked[currentSection][currentIndex] = true;
  updatePalette();
}

function changeSection(sec) {
  currentSection = sec;
  currentIndex = 0;
  loadQuestion();
}

/* ------------------- TIMER ------------------- */
let time = 3 * 60 * 60;

setInterval(() => {
  time--;

  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');

  if (time <= 0) submitTest();
}, 1000);

/* ------------------- SUBMIT ------------------- */
function submitTest() {
  let score = 0;

  for (let s in questions) {
    questions[s].forEach((q,i) => {
      let user = userAnswers[s][i];

      if (user === null) return;

      if (user === q.answer) {
        score += 4;
      } else {
        score -= 1;
      }
    });
  }

  alert("Final Score: " + score);
}

/* ------------------- START ------------------- */
loadQuestion();

</script>

</body>
</html>
