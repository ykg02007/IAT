<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Interface</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f8; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #333;
      color: white;
    }

    .sections button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .container { display: flex; }

    .main { width: 70%; padding: 20px; }

    .palette {
      width: 30%;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .box {
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #ccc;
      height: 40px;
    }

    .options button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      text-align: left;
    }

    .selected {
      background: #555 !important;
      color: white;
    }

    .controls { margin-top: 20px; }

    .controls button {
      padding: 10px 15px;
      margin-right: 10px;
    }

    img {
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    #imageModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #imageModal img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>Mock Test</div>
  <div id="timer">03:00:00</div>
</div>

<div class="sections">
  <button onclick="changeSection('physics')">Physics</button>
  <button onclick="changeSection('chemistry')">Chemistry</button>
  <button onclick="changeSection('maths')">Maths</button>
  <button onclick="changeSection('biology')">Biology</button>
</div>

<div class="container">

  <div class="main">
    <h3 id="question">Question</h3>
    <div id="qImage"></div>
    <div id="options" class="options"></div>

    <div class="controls">
      <button onclick="prevQ()">Previous</button>
      <button onclick="markReview()">Mark for Review</button>
      <button onclick="nextQ()">Next</button>
      <button onclick="submitTest()">Submit</button>
    </div>
  </div>

  <div id="palette" class="palette"></div>

</div>

<div id="imageModal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>

const questions = {
physics: [
  {
    q: `Question 1`,
    options: [
      { id: 1, text: "A" },
      { id: 2, text: "B" },
      { id: 3, text: "C" },
      { id: 4, text: "D" }
    ],
    answer: 1
  }
],

chemistry: [
  {
    q: `Which one of the following statements best describes ZnO and CaO?`,
    options: [
      { id: 1, text: "ZnO is amphoteric while CaO is basic" },
      { id: 2, text: "ZnO is basic while CaO is amphoteric" },
      { id: 3, text: "Both are amphoteric" },
      { id: 4, text: "ZnO acidic, CaO basic" }
    ],
    answer: 1
  },
  {
    q: `Which among the following processes is/are associated with increasing bond order but no change in diamagnetic/paramagnetic behaviour?`,
    img: "image/chemistry2.png",
    options: [
      { id: 1, text: "ii only" },
      { id: 2, text: "i and ii" },
      { id: 3, text: "ii and iii" },
      { id: 4, text: "iii only" }
    ],
    answer: 1
  },
  {
    q: ``,
    img: "image/chemistry3.png",
    options: [
      { id: 1, text: "-0.04 V" },
      { id: 2, text: "0.33 V" },
      { id: 3, text: "0.11 V" },
      { id: 4, text: "-0.11 V" }
    ],
    answer: 1
  },
  {
    q: `What are the correct orders of stability for the following compounds?`,
    options: [
      { id: 1, text: "VF5 > VCl5 ; CuCl2 > CuI2" },
      { id: 2, text: "VCl5 > VF5 ; CuCl2 > CuI2" },
      { id: 3, text: "VCl5 > VF5 ; CuI2 > CuCl2" },
      { id: 4, text: "VF5 > VCl5 ; CuI2 > CuCl2" }
    ],
    answer: 1
  },
  {
    q: `Consider the following reaction scheme:`,
   img: "image/chemistry5.png",
    options: [
      { id: 1, text: "P shows geometrical isomerism and absorbs light of higher wavelength than that of Q." },
      { id: 2, text: "Both P and Q show geometrical isomerism and P absorbs light of higher wavelength than that of Q." },
      { id: 3, text: "Q shows geometrical isomerism and absorbs light of higher wavelength than that of P." },
      { id: 4, text: "P shows geometrical isomerism and absorbs light of lower wavelength than that of Q." }
     ],
     answer: 1
   },
  {
    q: `How many —-hydrogen is/are present in 2-methyl-3-phenyl-pentan-1-al?:`,
    options: [
      { id: 1, text: "4" },
      { id: 2, text: "1" },
      { id: 3, text: "3" },
      { id: 4, text: "2" }
     ],
     answer: 1
   },
  {
    q: `Which of the following reactions do NOT provide an aldehyde as a product?`,
    options: [
      { id: 1, text: "",img:"image/chemopt71.png" },
      { id: 2, text: "",img:"image/chemopt72.png" },
      { id: 3, text: "",img:"image/chemopt73.png" },
      { id: 4, text: "",img:"image/chemopt74.png" }
     ],
     answer: 1
   },
   {
    q: `What are the major products formed in the following reaction sequence?`,
    img:"image/chemistry8.png",
    options: [
      { id: 1, text: "",img:"image/chemopt81.png" },
      { id: 2, text: "",img:"image/chemopt82.png" },
      { id: 3, text: "",img:"image/chemopt83.png" },
      { id: 4, text: "",img:"image/chemopt84.png" }
     ],
     answer: 1
   },
   {
    q: `What is the major product in the reaction sequence given below?`,
    img:"image/chemistry9.png",
    options: [
      { id: 1, text: "",img:"image/chemopt91.png" },
      { id: 2, text: "",img:"image/chemopt92.png" },
      { id: 3, text: "",img:"image/chemopt93.png" },
      { id: 4, text: "",img:"image/chemopt94.png" }
     ],
     answer: 1
   },
   {
    q: `Compound I undergoes hydroboration-oxidation reaction with (BH3)2 followed by treatment with H2O2 and aqueous NaOH to produce another compound II, which upon oxidation with CrO3 gives 2,3-dimethyl-cyclohexanone as the product. What is the structure of I?`,
    options: [
      { id: 1, text: "",img:"image/chemopt101.png" },
      { id: 2, text: "",img:"image/chemopt102.png" },
      { id: 3, text: "",img:"image/chemopt103.png" },
      { id: 4, text: "",img:"image/chemopt104.png" }
     ],
     answer: 1
   },
   {
    q: ``,
     img:"image/chemistry11.png",
    options: [
      { id: 1, text: "",img:"image/chemopt111.png" },
      { id: 2, text: "",img:"image/chemopt112.png" },
      { id: 3, text: "",img:"image/chemopt113.png" },
      { id: 4, text: "",img:"image/chemopt114.png" }
     ],
     answer: 1
   },
   {
    q: ``,
     img:"image/chemistry12.png",
    options: [
      { id: 1, text: "",img:"image/chemopt121.png" },
      { id: 2, text: "",img:"image/chemopt122.png" },
      { id: 3, text: "",img:"image/chemopt123.png" },
      { id: 4, text: "",img:"image/chemopt124.png" }
     ],
     answer: 1
   },
   {
    q: ``,
     img:"image/chemistry13.png",
    options: [
      { id: 1, text: " 2.4 femtoseconds" },
      { id: 2, text: "4.8 femtoseconds"},
      { id: 3, text: "24 femtoseconds" },
      { id: 4, text: "0.24 femtoseconds" }
     ],
     answer: 1
   },
   {
    q: `The dipole moments of three AB3-type molecules I, II, and III are measured to be 0.0 D, 0.2 D, and 1.5 D, respectively. Which one of the following options is correct regarding the identity of I, II, and III?`,
    options: [
      { id: 1, text: "I: BF3, II: NF3, III: NH3" },
      { id: 2, text: "I: BF3, II: NH3, III: NF3" },
      { id: 3, text: "I: ClF3, II: NF3, III: NH3" },
      { id: 4, text: "I: BCl3, II: NH3, III: NF3" }
     ],
     answer: 1
   },
   {
    q: `During the charging and discharging of a lead-acid battery (a Pb anode, a grid of Pb packed with PbO2 as cathode, and an aqueous solution of H2SO4 as an electrolyte), which of the following redox reactions does NOT occur?`,
    options: [
      { id: 1, text: "",img:"image/chemopt151.png" },
      { id: 2, text: "",img:"image/chemopt152.png" },
      { id: 3, text: "",img:"image/chemopt153.png" },
      { id: 4, text: "",img:"image/chemopt154.png" }
     ],
     answer: 1
   },
 ],  
};

/* STATE */
let currentSection = "physics";
let currentIndex = 0;

let userAnswers = {};
let visited = {};
let marked = {};
let shuffledOptions = {}; // ✅ FIX

for (let s in questions) {
  userAnswers[s] = Array(questions[s].length).fill(null);
  visited[s] = Array(questions[s].length).fill(false);
  marked[s] = Array(questions[s].length).fill(false);
}

/* IMAGE ZOOM */
function openImage(src) {
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

/* SHUFFLE */
function shuffle(arr) {
  let newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

/* LOAD QUESTION */
function loadQuestion() {
  let q = questions[currentSection][currentIndex];
  visited[currentSection][currentIndex] = true;

  document.getElementById("question").innerText =
    (currentIndex+1) + ". " + q.q;

  let imgDiv = document.getElementById("qImage");
  imgDiv.innerHTML = q.img
    ? `<img src="${q.img}" style="max-width:100%;" onclick="openImage('${q.img}')">`
    : "";

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  // ✅ SHUFFLE ONLY ONCE
  let key = currentSection + "_" + currentIndex;
  if (!shuffledOptions[key]) {
    shuffledOptions[key] = shuffle(q.options);
  }

  let selected = userAnswers[currentSection][currentIndex];

  shuffledOptions[key].forEach(opt => {
    let btn = document.createElement("button");

    btn.innerHTML = `
      ${opt.text ? `<div>${opt.text}</div>` : ""}
      ${opt.img ? `<img src="${opt.img}" style="max-width:120px;" onclick="openImage('${opt.img}')">` : ""}
    `;

    if (selected === opt.id) btn.classList.add("selected");

    btn.onclick = (e) => {
      if (e.target.tagName === "IMG") return;

      if (userAnswers[currentSection][currentIndex] === opt.id) {
        userAnswers[currentSection][currentIndex] = null;
      } else {
        userAnswers[currentSection][currentIndex] = opt.id;
      }

      loadQuestion(); // NO reshuffle now ✅
    };

    optionsDiv.appendChild(btn);
  });

  updatePalette();
}

/* PALETTE */
function updatePalette() {
  let palette = document.getElementById("palette");
  palette.innerHTML = "";

  for (let i = 0; i < questions[currentSection].length; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = i + 1;

    if (!visited[currentSection][i]) box.style.background = "white";
    else if (marked[currentSection][i]) box.style.background = "yellow";
    else if (userAnswers[currentSection][i]) box.style.background = "green";
    else box.style.background = "red";

    box.onclick = () => {
      currentIndex = i;
      loadQuestion();
    };

    palette.appendChild(box);
  }
}

/* NAVIGATION */
function nextQ() {
  if (currentIndex < questions[currentSection].length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

function markReview() {
  marked[currentSection][currentIndex] = true;
  updatePalette();
}

function changeSection(sec) {
  currentSection = sec;
  currentIndex = 0;
  loadQuestion();
}

/* TIMER */
let time = 3 * 60 * 60;

setInterval(() => {
  time--;

  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');

  if (time <= 0) submitTest();
}, 1000);

/* SUBMIT */
function submitTest() {
  let score = 0;

  for (let s in questions) {
    questions[s].forEach((q,i) => {
      let user = userAnswers[s][i];
      if (user === null) return;

      if (user === q.answer) score += 4;
      else score -= 1;
    });
  }

  alert("Final Score: " + score);
}

loadQuestion();

</script>

</body>
</html>
