<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Interface</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f8; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #333;
      color: white;
    }

    .sections button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .container { display: flex; }

    .main { width: 70%; padding: 20px; }

    .palette {
      width: 30%;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .box {
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #ccc;
      height: 40px;
    }

    .options button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      text-align: left;
    }

    .selected {
      background: #555 !important;
      color: white;
    }

    img {
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    #imageModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    #imageModal img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>Mock Test</div>
  <div id="timer">03:00:00</div>
</div>

<div class="sections">
  <button onclick="changeSection('physics')">Physics</button>
  <button onclick="changeSection('chemistry')">Chemistry</button>
</div>

<div class="container">

  <div class="main">
    <h3 id="question"></h3>
    <div id="qImage"></div>
    <div id="options"></div>

    <button onclick="prevQ()">Prev</button>
    <button onclick="nextQ()">Next</button>
    <button onclick="submitTest()">Submit</button>
  </div>

  <div id="palette" class="palette"></div>

</div>

<div id="imageModal" onclick="closeImage()">
  <img id="modalImg">
</div>

<script>

/* ---------------- QUESTIONS ---------------- */
const questions = {
  physics: [
    {
      q: "Question 1",
      options: [
        { id: 1, text: "A" },
        { id: 2, text: "B" },
        { id: 3, text: "C" },
        { id: 4, text: "D" }
      ],
      answer: 1
    }
  ],

  chemistry: [
    {
      q: "Which one describes ZnO and CaO?",
      options: [
        { id: 1, text: "ZnO amphoteric, CaO basic" },
        { id: 2, text: "ZnO basic, CaO amphoteric" },
        { id: 3, text: "Both amphoteric" },
        { id: 4, text: "ZnO acidic, CaO basic" }
      ],
      answer: 1
    },
    {
      q: "Process question",
      img: "image/chemistry2.png",
      options: [
        { id: 1, text: "ii only" },
        { id: 2, text: "i and ii" },
        { id: 3, text: "ii and iii" },
        { id: 4, text: "iii only" }
      ],
      answer: 1
    }
  ]
};

/* ---------------- STATE ---------------- */
let currentSection = "physics";
let currentIndex = 0;

let userAnswers = JSON.parse(localStorage.getItem("answers")) || {};
let shuffledQuestions = JSON.parse(localStorage.getItem("shuffle")) || {};

/* ---------------- INIT ---------------- */
function init() {
  if (Object.keys(shuffledQuestions).length === 0) {
    for (let sec in questions) {
      shuffledQuestions[sec] = questions[sec].map(q => {
        let shuffled = [...q.options].sort(() => Math.random() - 0.5);
        return { ...q, shuffledOptions: shuffled };
      });
    }
    localStorage.setItem("shuffle", JSON.stringify(shuffledQuestions));
  }
}

/* ---------------- IMAGE ---------------- */
function openImage(src) {
  document.getElementById("imageModal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}
function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

/* ---------------- LOAD ---------------- */
function loadQuestion() {
  let q = shuffledQuestions[currentSection][currentIndex];

  document.getElementById("question").innerText =
    (currentIndex + 1) + ". " + q.q;

  let imgDiv = document.getElementById("qImage");
  imgDiv.innerHTML = q.img
    ? `<img src="${q.img}" onclick="openImage('${q.img}')">`
    : "";

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  let selected = userAnswers[currentSection]?.[currentIndex];

  q.shuffledOptions.forEach(opt => {
    let btn = document.createElement("button");

    btn.innerHTML = `
      ${opt.text || ""}
      ${opt.img ? `<img src="${opt.img}">` : ""}
    `;

    if (selected === opt.id) btn.classList.add("selected");

    btn.onclick = (e) => {
      if (e.target.tagName === "IMG") return;

      if (!userAnswers[currentSection]) {
        userAnswers[currentSection] = [];
      }

      userAnswers[currentSection][currentIndex] =
        selected === opt.id ? null : opt.id;

      localStorage.setItem("answers", JSON.stringify(userAnswers));
      loadQuestion();
    };

    optionsDiv.appendChild(btn);
  });
}

/* ---------------- NAV ---------------- */
function nextQ() {
  currentIndex++;
  loadQuestion();
}
function prevQ() {
  currentIndex--;
  loadQuestion();
}
function changeSection(sec) {
  currentSection = sec;
  currentIndex = 0;
  loadQuestion();
}

/* ---------------- SUBMIT ---------------- */
function submitTest() {
  let score = 0;

  for (let sec in shuffledQuestions) {
    shuffledQuestions[sec].forEach((q, i) => {
      let user = userAnswers[sec]?.[i];
      if (user === q.answer) score += 4;
      else if (user != null) score -= 1;
    });
  }

  alert("Score: " + score);
}

/* ---------------- START ---------------- */
init();
loadQuestion();

</script>

</body>
</html>
