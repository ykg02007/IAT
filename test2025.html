<!DOCTYPE html>
<html>
<head>
  <title>Mock Test Interface</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f8; }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #333;
      color: white;
    }

    .sections button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

   .container {
  display: block; /* remove flex */
}

/* LEFT SIDE */
.main {
  width: calc(100% - 320px); /* leave space for palette */
  padding: 20px;
}

/* RIGHT SIDE FIXED PANEL */
.palette {
  position: fixed;
  top: 70px; /* below topbar */
  right: 0;
  width: 300px;
  height: calc(100vh - 70px);
  padding: 10px;

  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;

  background: #f4f6f8;
  border-left: 2px solid #ccc;

  overflow-y: auto; /* scroll if many questions */
}
    .box {
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid #ccc;
      height: 40px;
    }

    .options button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      text-align: left;
    }

    .selected {
      background: #555 !important;
      color: white;
    }

    .controls { margin-top: 20px; }

    .controls button {
      padding: 10px 15px;
      margin-right: 10px;
    }

    img {
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
#imageModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 2000;
  cursor: zoom-out;
}

#imageModal img {
  max-width: 95%;
  max-height: 95%;
  border-radius: 10px;
  box-shadow: 0 0 20px black;
  transition: transform 0.3s ease;
}

#imageModal img:hover {
  transform: scale(1.05);
}
  </style>
</head>

<div class="topbar">

/* STATE */
let currentSection = "physics";
let currentIndex = 0;
  
let userAnswers = {};
let visited = {};
let marked = {};
let shuffledOptions = {}; // ✅ FIX
let isAnalysisMode = false;

for (let s in questions) {
  userAnswers[s] = Array(questions[s].length).fill(null);
  visited[s] = Array(questions[s].length).fill(false);
  marked[s] = Array(questions[s].length).fill(false);
}

/* IMAGE ZOOM */
function openImage(src) {
  const modal = document.getElementById("imageModal");
  const img = document.getElementById("modalImg");

  img.style.transform = "scale(0.8)";
  img.src = src;

  modal.style.display = "flex";

  setTimeout(() => {
    img.style.transform = "scale(1)";
  }, 10);
}

function closeImage() {
  document.getElementById("imageModal").style.display = "none";
}

/* SHUFFLE */
function shuffle(arr) {
  let newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

/* LOAD QUESTION */
function loadQuestion() {
  let q = questions[currentSection][currentIndex];
  visited[currentSection][currentIndex] = true;

  document.getElementById("question").innerText =
    (currentIndex+1) + ". " + q.q;

  let imgDiv = document.getElementById("qImage");
  imgDiv.innerHTML = q.img
    ? `<img src="${q.img}" style="max-width:100%;" onclick="openImage('${q.img}')">`
    : "";

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  // ✅ SHUFFLE ONLY ONCE
  let key = currentSection + "_" + currentIndex;
  if (!shuffledOptions[key]) {
    shuffledOptions[key] = shuffle(q.options);
  }

  let selected = userAnswers[currentSection][currentIndex];

  shuffledOptions[key].forEach(opt => {
    let btn = document.createElement("button");

    btn.innerHTML = `
      ${opt.text ? `<div>${opt.text}</div>` : ""}
      ${opt.img ? `<img src="${opt.img}" style="max-width:120px;" onclick="openImage('${opt.img}')">` : ""}
    `;

  let correct = q.answer;

// ✅ ANALYSIS MODE COLORS
if (isAnalysisMode) {
  btn.style.cursor = "default";

  if (selected === null) {
    if (opt.id === correct) {
      btn.style.background = "#d1c4e9"; // purple
    }
  }
  else if (selected === correct) {
    if (opt.id === correct) {
      btn.style.background = "#a5d6a7"; // green
    }
  }
  else {
    if (opt.id === correct) {
      btn.style.background = "#a5d6a7"; // correct
    }
    if (opt.id === selected) {
      btn.style.background = "#ef9a9a"; // wrong
    }
  }
}
else {
  // normal test behavior
  if (selected === opt.id) btn.classList.add("selected");

  btn.onclick = (e) => {
    if (e.target.tagName === "IMG") return;

    let current = userAnswers[currentSection][currentIndex];

    if (current === opt.id) {
      userAnswers[currentSection][currentIndex] = null;
    } else {
      userAnswers[currentSection][currentIndex] = opt.id;
      marked[currentSection][currentIndex] = false;
    }

    loadQuestion();
  };
}
    optionsDiv.appendChild(btn);
  });

  updatePalette();
}

/* PALETTE */
function updatePalette() {
  let palette = document.getElementById("palette");
  palette.innerHTML = "";

  for (let i = 0; i < questions[currentSection].length; i++) {
    let box = document.createElement("div");
    box.className = "box";
    box.innerText = i + 1;

   let user = userAnswers[currentSection][i];
let correct = questions[currentSection][i].answer;

if (isAnalysisMode) {
  if (user === null) {
    box.style.background = "white"; // unattempted
  }
  else if (user === correct) {
    box.style.background = "#00c853"; // correct
    box.style.color = "white";
  }
  else {
    box.style.background = "#ff1744"; // wrong
    box.style.color = "white";
  }
}
else {
  if (!visited[currentSection][i]) {
    box.style.background = "white";
  }
  else if (userAnswers[currentSection][i]) {
    box.style.background = "#00c853";
    box.style.color = "white";
  }
  else if (marked[currentSection][i]) {
    box.style.background = "#a020f0";
    box.style.color = "white";
  }
  else {
    box.style.background = "#ff1744";
    box.style.color = "white";
  }
}
    box.onclick = () => {
      currentIndex = i;
      loadQuestion();
    };

    palette.appendChild(box);
  }
}

/* NAVIGATION */
function nextQ() {
  if (currentIndex < questions[currentSection].length - 1) {
    currentIndex++;
    loadQuestion();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    loadQuestion();
  }
}

function markReview() {
  if (isAnalysisMode) return; // disable in analysis

  marked[currentSection][currentIndex] = 
    !marked[currentSection][currentIndex];

  updatePalette();
}
function changeSection(sec) {
  currentSection = sec;
  currentIndex = 0;
  loadQuestion();
}

/* TIMER */
let time = 3 * 60 * 60;
let timerInterval = setInterval(() => {
  time--;

  let h = Math.floor(time / 3600);
  let m = Math.floor((time % 3600) / 60);
  let s = time % 60;

  document.getElementById("timer").innerText =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');

  if (time <= 0) submitTest();
}, 1000);

/* SUBMIT */
function submitTest() {
  clearInterval(timerInterval); // ✅ stop timer

  let score = 0;

  for (let s in questions) {
    questions[s].forEach((q,i) => {
      let user = userAnswers[s][i];
      if (user === null) return;

      if (user === q.answer) score += 4;
      else score -= 1;
    });
  }

  // ✅ Show modal instead of alert
  document.getElementById("scoreText").innerText =
    "YOU SCORED - " + score;

  document.getElementById("resultModal").style.display = "flex";
}
  function showOverview() {
  let total = 0;
  let subjectScores = {
    physics: 0,
    chemistry: 0,
    maths: 0
  };

  for (let s in questions) {
    questions[s].forEach((q, i) => {
      let user = userAnswers[s][i];
      if (user === null) return;

      if (user === q.answer) {
        total += 4;
        subjectScores[s] += 4;
      } else {
        total -= 1;
        subjectScores[s] -= 1;
      }
    });
  }

  alert(
    "📊 OVERVIEW\n\n" +
    "Total Score: " + total + "\n\n" +
    "Physics: " + subjectScores.physics + "\n" +
    "Chemistry: " + subjectScores.chemistry + "\n" +
    "Maths: " + subjectScores.maths
  );
}
  
  function viewAnalysis() {
  isAnalysisMode = true;

  document.getElementById("resultModal").style.display = "none";

  // ✅ show overview button
  document.getElementById("overviewBtn").style.display = "inline-block";

  currentSection = "physics";
  currentIndex = 0;

  loadQuestion();
}
</script>

  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:2000;
">
  <div style="
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
  ">
    <h2 id="scoreText">YOU SCORED</h2>
    <button onclick="viewAnalysis()" style="
      margin-top:20px;
      padding:10px 20px;
      background:#6200ea;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    ">
      VIEW ANALYSIS
    </button>
  </div>
</div>
</body>
